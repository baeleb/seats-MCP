name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test ./... -race -cover

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Cross-compile
        run: |
          suffix=""
          [ "${{ matrix.goos }}" = "windows" ] && suffix=".exe"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o seats-mcp${{ matrix.goos == 'windows' && '.exe' || '' }} .
      - uses: actions/upload-artifact@v4
        with:
          name: seats-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: seats-mcp${{ matrix.goos == 'windows' && '.exe' || '' }}
          retention-days: 7
